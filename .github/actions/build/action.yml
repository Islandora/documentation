---
name: Build
description: Setup to install dependencies and build docs with zensical
runs:
  using: "composite"
  steps:
    - name: Setup build environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
        cache: 'pip'
    - name: Install build requirements
      shell: bash
      run: pip install -r requirements.txt
    - name: Build docs
      shell: bash
      run: zensical build
